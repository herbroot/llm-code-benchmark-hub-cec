<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ByteBench Hub</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>ByteBench Hub</h1>
      <p>Unified model scoreboard for HumanEval, MBPP, HumanEval Infilling, DS-1000, SWE-bench, and EvalPlus.</p>
      <div class="chips" id="benchmarkChips"></div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <input id="searchInput" placeholder="Filter model / benchmark..." />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Benchmark</th>
              <th>Metric</th>
              <th>Model Family</th>
              <th>Model</th>
              <th>Score</th>
              <th>Source</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="scoreBody"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
